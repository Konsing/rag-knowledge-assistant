services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./eval:/app/eval
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - qdrant

  mcp-server:
    build: ./backend
    ports:
      - "8811:8811"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - qdrant
    command: ["python", "mcp_server.py", "--transport", "streamable-http", "--port", "8811"]

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
